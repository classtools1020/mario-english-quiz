<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超級馬力歐：英文段考大冒險</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        :root {
            --mario-red: #E52521;
            --mario-blue: #049CD8;
            --mario-yellow: #FBD000;
            --mario-green: #43B047;
            --mario-brown: #885418;
        }
        body {
            background: #5c94fc;
            font-family: 'ZCOOL KuaiLe', sans-serif, "Microsoft JhengHei";
            overflow-x: hidden;
            user-select: none;
            min-height: 100vh;
            padding-bottom: 80px;  /* 留位置給地面與 Mario */
        }
        .mario-card {
            background: white;
            border: 6px solid #000;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
            border-radius: 20px;
            position: relative;
            z-index: 20;
        }
        .brick-btn {
            background: #ab4700;
            border: 4px solid #000;
            color: white;
            image-rendering: pixelated;
            position: relative;
            transition: all 0.1s;
            cursor: pointer;
            box-shadow: 4px 4px 0px #5e3a11;
        }
        .brick-btn:active { transform: translateY(4px); box-shadow: 0px 0px 0px #5e3a11; }

        .option-card {
            border: 4px solid #e5e7eb;
            transition: all 0.2s;
            cursor: pointer;
            background: white;
            font-size: 1.5rem;
        }
        .option-card:hover {
            border-color: var(--mario-blue);
            background: #e0f2fe;
            transform: scale(1.03);
        }

        .coin-pop {
            position: absolute;
            animation: coinUp 0.8s ease-out forwards;
            color: var(--mario-yellow);
            font-size: 3rem;
            z-index: 100;
            text-shadow: 2px 2px 0 #000;
        }
        @keyframes coinUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translateY(-150px) scale(1.5); }
            100% { transform: translateY(-200px) scale(1); opacity: 0; }
        }

        .ground {
            background: #885418;
            height: 60px;
            width: 100%;
            position: fixed;
            bottom: 0;
            background-image: linear-gradient(90deg, #946124 25%, transparent 25%, transparent 50%, #946124 50%, #946124 75%, transparent 75%, transparent);
            background-size: 40px 40px;
            z-index: 50;
            border-top: 4px solid #000;
        }
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: moveCloud 20s linear infinite;
        }
        @keyframes moveCloud {
            from { left: -200px; }
            to { left: 110%; }
        }

        .mario-char {
            width: 80px;
            height: 80px;
            position: fixed;
            bottom: 60px;
            left: 50px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 60;
        }
        .monster {
            width: 50px;
            height: 50px;
            position: fixed;
            bottom: 60px;
            right: -100px;
            z-index: 55;
            transition: right 0.5s linear;
        }
        /* === 世界中的問號磚塊（在 Mario 頭頂） === */
        .q-block-hit {
            position: fixed;
            bottom: 230px;
            left: 60px;
            width: 60px;
            height: 60px;
            background: #f1921c;
            border: 4px solid #000;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: 900;
            z-index: 50;
            box-shadow: inset 4px -4px 0 rgba(0,0,0,0.25), 4px 4px 0 rgba(0,0,0,0.4);
            text-shadow: 2px 2px 0 #c2640d;
        }
        .q-block-hit.show { display: flex; }
        .q-block-hit.used {
            background: #885418;
            color: transparent;
            box-shadow: inset 0 0 0 4px #5e3a11, 4px 4px 0 rgba(0,0,0,0.4);
        }

        /* === Mario 待機時輕微晃動（像在原地跑步）=== */
        @keyframes marioIdle {
            0%, 100% { transform: translateY(0)    scaleX(1);   }
            25%      { transform: translateY(-3px) scaleX(0.97); }
            50%      { transform: translateY(0)    scaleX(1.02); }
            75%      { transform: translateY(-3px) scaleX(0.97); }
        }
        .mario-idle { animation: marioIdle 0.5s infinite ease-in-out; }

        /* === 大星星從磚塊頂端蹦出 === */
        @keyframes starFly {
            0%   { transform: translate(-50%, 0)     rotate(0deg)    scale(0.3); opacity: 1; }
            15%  { transform: translate(-50%, -40px) rotate(180deg)  scale(1.6); opacity: 1; }
            55%  { transform: translate(-50%, -200px) rotate(720deg) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -340px) rotate(1080deg) scale(0.5); opacity: 0; }
        }
        .star-fly {
            position: fixed;
            font-size: 3.5rem;
            color: gold;
            text-shadow: 0 0 15px gold, 0 0 30px #FFA500, 4px 4px 0 #c2640d;
            z-index: 250;
            pointer-events: none;
            animation: starFly 1.4s ease-out forwards;
        }

        .hint-box {
            background: #fffbe6;
            border: 3px solid var(--mario-yellow);
            padding: 15px;
            margin-top: 15px;
            font-weight: bold;
            border-radius: 10px;
        }

        /* === 跳躍：直直跳起來頂頭頂磚塊 === */
        @keyframes marioJump {
            0%   { transform: translate(0, 0)     rotate(0deg);   }
            30%  { transform: translate(0, -60px) rotate(120deg); }
            45%  { transform: translate(0, -95px) rotate(200deg); }   /* 峰頂 — 撞到磚塊 */
            55%  { transform: translate(0, -85px) rotate(240deg); }   /* 反彈停頓 */
            75%  { transform: translate(0, -40px) rotate(340deg); }
            100% { transform: translate(0, 0)     rotate(360deg); }
        }
        .mario-jump { animation: marioJump 1.0s cubic-bezier(0.4, 0, 0.6, 1); }

        /* === 金幣噴射（5 顆） === */
        @keyframes coinShoot {
            0%   { transform: translate(0, 0) rotate(0deg) scale(0.5); opacity: 1; }
            50%  { transform: translate(var(--tx), var(--ty)) rotate(540deg) scale(1.4); opacity: 1; }
            100% { transform: translate(calc(var(--tx) * 0.8), calc(var(--ty) + 240px)) rotate(900deg) scale(0.3); opacity: 0; }
        }
        .coin-shoot {
            position: fixed;
            font-size: 2.6rem;
            color: var(--mario-yellow);
            text-shadow: 2px 2px 0 #000, 0 0 12px rgba(255, 215, 0, 0.9);
            z-index: 200;
            pointer-events: none;
            animation: coinShoot 1.1s cubic-bezier(0.4, 0, 0.6, 1) forwards;
        }

        /* === 怪物被踩扁倒地 === */
        @keyframes monsterStomp {
            0%   { transform: scaleY(1)   scaleX(1)   translateY(0); opacity: 1; }
            20%  { transform: scaleY(0.3) scaleX(1.5) translateY(0); opacity: 1; }
            45%  { transform: scaleY(0.3) scaleX(1.5) translateY(0); opacity: 1; }
            100% { transform: scaleY(0.2) scaleX(1.6) translateY(80px) rotate(25deg); opacity: 0; }
        }
        .monster-stomped { animation: monsterStomp 0.9s ease-in forwards; }

        /* === 螢幕震動 === */
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-6px, 3px); }
            40% { transform: translate(6px, -3px); }
            60% { transform: translate(-3px, 6px); }
            80% { transform: translate(3px, -6px); }
        }
        .screen-shake { animation: screenShake 0.45s; }

        /* === 問號磚塊被頂飛 === */
        @keyframes blockBump {
            0%, 100% { transform: translateY(0); }
            40%      { transform: translateY(-25px); }
        }
        .block-bump { animation: blockBump 0.45s ease-out; }

        /* === 連擊橫幅 COMBO === */
        @keyframes streakFlash {
            0%   { transform: translateX(-50%) scale(0)   rotate(-30deg); opacity: 0; }
            20%  { transform: translateX(-50%) scale(1.6) rotate(8deg);   opacity: 1; }
            70%  { transform: translateX(-50%) scale(1.2) rotate(-4deg);  opacity: 1; }
            100% { transform: translateX(-50%) scale(0.6) rotate(0deg);   opacity: 0; }
        }
        .streak-banner {
            position: fixed;
            top: 22%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: 5rem;
            font-weight: 900;
            color: var(--mario-yellow);
            text-shadow: 5px 5px 0 #000, -3px -3px 0 #E52521;
            z-index: 300;
            pointer-events: none;
            white-space: nowrap;
        }
        .streak-banner.show { animation: streakFlash 1.6s ease-out; }

        /* === 換題時：地面往左捲動（橫向捲軸感） === */
        @keyframes groundScroll {
            from { background-position: 0 0; }
            to   { background-position: -240px 0; }
        }
        .ground.scrolling { animation: groundScroll 1s linear; }

        /* === 舊磚塊往左飛走 / 新磚塊從右邊滑入 === */
        @keyframes blockExit {
            0%   { transform: translateX(0)     rotate(0deg);   opacity: 1; }
            100% { transform: translateX(-700px) rotate(-90deg); opacity: 0; }
        }
        .q-block-hit.exiting { animation: blockExit 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes blockEnter {
            0%   { transform: translateX(900px) rotate(60deg); opacity: 0; }
            60%  { transform: translateX(-15px) rotate(-8deg); opacity: 1; }
            100% { transform: translateX(0)     rotate(0deg);  opacity: 1; }
        }
        .q-block-hit.entering { animation: blockEnter 0.7s cubic-bezier(0.25, 0.8, 0.5, 1.2); }

        /* === 答錯：Mario 踉蹌往後退 + 受傷紅光 === */
        @keyframes marioStumble {
            0%   { transform: translate(0, 0)        rotate(0deg);   }
            20%  { transform: translate(-18px, -10px) rotate(-18deg); }
            40%  { transform: translate(-30px, 0)     rotate(0deg);   }
            65%  { transform: translate(-22px, -6px)  rotate(12deg);  }
            100% { transform: translate(0, 0)         rotate(0deg);   }
        }
        .mario-stumble { animation: marioStumble 0.85s ease-out; }
        @keyframes marioHurt {
            0%, 100% { filter: none; }
            25%, 75% { filter: brightness(1.4) sepia(1) hue-rotate(-50deg) saturate(6); }
        }
        .mario-hurt { animation: marioHurt 0.65s; }

        /* === Power-up 變大時的金光 === */
        .mario-glow {
            filter: drop-shadow(0 0 18px gold) drop-shadow(0 0 36px gold);
            transform: scale(1.3);
            transition: filter 0.3s, transform 0.3s;
        }

        /* === 加分提示文字（+10 / +20）=== */
        @keyframes pointFloat {
            0%   { transform: translate(0, 0) scale(0.8); opacity: 1; }
            100% { transform: translate(0, -80px) scale(1.4); opacity: 0; }
        }
        .point-float {
            position: fixed;
            font-size: 2rem;
            font-weight: 900;
            color: var(--mario-yellow);
            text-shadow: 3px 3px 0 #000;
            z-index: 250;
            pointer-events: none;
            animation: pointFloat 1.2s ease-out forwards;
        }

        /* === 終點旗桿 === */
        .flag-pole {
            position: fixed;
            bottom: 60px;
            right: -120px;
            width: 6px;
            height: 220px;
            background: linear-gradient(to bottom, #aaa, #555);
            border: 2px solid #000;
            z-index: 55;
            transition: right 0.8s ease-out;
        }
        .flag-pole.show { right: 12%; }
        .flag-pole::before {
            content: '★';
            position: absolute;
            top: -28px; left: -10px;
            width: 26px; height: 26px;
            background: gold;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            border: 2px solid #000;
        }
        .flag-cloth {
            position: absolute;
            top: 8px; left: 6px;
            width: 70px; height: 50px;
            background: var(--mario-green);
            border: 2px solid #000;
            clip-path: polygon(0 0, 100% 50%, 0 100%);
        }

        /* === 手機 / 直立 iPad（≤768px）：壓縮版面、縮小世界元素 === */
        @media (max-width: 768px) {
            /* HUD 縮小 */
            body > div:first-of-type + div + div { font-size: 1rem !important; padding: 0.75rem !important; }
            .text-3xl { font-size: 1.05rem !important; }
            body > div.flex img { width: 1.25rem !important; height: 1.25rem !important; margin-right: 0.25rem !important; }

            /* 卡片內距、字體調整 */
            .mario-card { border-width: 4px !important; box-shadow: 6px 6px 0 rgba(0,0,0,0.3) !important; }
            #welcome-screen, #question-screen, #finish-screen { padding: 1rem !important; }
            #welcome-screen h1 { font-size: 2rem !important; margin-bottom: 0.75rem !important; }
            #welcome-screen p { font-size: 1.05rem !important; margin-bottom: 1rem !important; }
            #welcome-screen input { font-size: 1.1rem !important; padding: 0.75rem !important; margin-bottom: 1rem !important; }
            #welcome-screen button.brick-btn { font-size: 1.4rem !important; padding: 0.9rem !important; margin-bottom: 1rem !important; }
            #question-text { font-size: 1.1rem !important; line-height: 1.5 !important; margin-bottom: 0.6rem !important; }
            #chinese-translate { font-size: 0.85rem !important; padding: 0.6rem !important; border-width: 2px !important; }
            #options-container { gap: 0.6rem !important; }
            .option-card { padding: 0.6rem !important; font-size: 0.95rem !important; border-width: 2px !important; }
            .option-card span:first-child { width: 2rem !important; height: 2rem !important; font-size: 0.85rem !important; margin-right: 0.5rem !important; border-width: 1px !important; }
            .hint-box { font-size: 0.85rem !important; padding: 0.5rem !important; }
            .brick-btn { font-size: 1rem !important; padding: 0.6rem 1rem !important; }
            #finish-screen h1 { font-size: 2rem !important; }
            #finish-screen p { font-size: 1.1rem !important; margin-bottom: 1.5rem !important; }
            #finish-screen img { width: 4rem !important; height: 4rem !important; }

            /* 世界元素縮小 + 重新定位 */
            .mario-char { width: 50px !important; height: 50px !important; bottom: 38px !important; left: 8px !important; }
            .monster { width: 36px !important; height: 36px !important; bottom: 38px !important; }
            .q-block-hit {
                width: 42px !important;
                height: 42px !important;
                left: 12px !important;
                bottom: 110px !important;
                font-size: 1.4rem !important;
                border-width: 3px !important;
            }
            .ground { height: 38px !important; border-top-width: 3px !important; background-size: 28px 28px !important; }
            .cloud { display: none !important; }

            /* 重新調整 Mario 跳躍高度，配合磚塊新位置 */
            @keyframes marioJump {
                0%   { transform: translate(0, 0)     rotate(0deg);   }
                30%  { transform: translate(0, -42px) rotate(120deg); }
                45%  { transform: translate(0, -68px) rotate(200deg); }
                55%  { transform: translate(0, -62px) rotate(240deg); }
                75%  { transform: translate(0, -26px) rotate(340deg); }
                100% { transform: translate(0, 0)     rotate(360deg); }
            }

            /* 星星與 COMBO 橫幅縮小 */
            .star-fly { font-size: 2.4rem !important; }
            .streak-banner { font-size: 3rem !important; top: 18% !important; }
            .point-float { font-size: 1.4rem !important; }
        }

        /* === 超小機（≤400px iPhone）再壓一檔 === */
        @media (max-width: 400px) {
            #question-text { font-size: 1rem !important; }
            .option-card { font-size: 0.9rem !important; padding: 0.5rem !important; }
            #welcome-screen h1 { font-size: 1.7rem !important; }
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="cloud w-32 h-12 top-20" style="animation-delay: -5s;"></div>
    <div class="cloud w-48 h-16 top-40" style="animation-delay: -12s;"></div>

    <div class="w-full max-w-2xl flex justify-between items-center p-6 text-white text-3xl drop-shadow-[0_4px_4px_rgba(0,0,0,1)] z-10">
        <div class="flex items-center">
            <img src="https://api.iconify.design/mdi:account-circle.svg?color=white" class="w-8 h-8 mr-2">
            <span id="display-name" class="text-yellow-300">GUEST</span>
        </div>
        <div class="text-center font-bold">WORLD <span id="current-stage">1-1</span></div>
        <div class="flex items-center gap-4">
            <div class="flex items-center text-orange-300">
                🔥 x <span id="streak-count">0</span>
            </div>
            <div class="flex items-center text-yellow-400">
                <img src="https://api.iconify.design/twemoji:coin.svg" class="w-8 h-8 mr-2">
                x <span id="coin-count">0</span>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md bg-black/30 h-6 rounded-full mb-8 border-4 border-black overflow-hidden mx-4 relative z-10">
        <div id="progress" class="bg-green-500 h-full transition-all duration-500" style="width: 0%"></div>
    </div>

    <div id="game-container" class="w-full max-w-2xl px-4 z-20">
        <div id="welcome-screen" class="mario-card p-10 text-center animate__animated animate__zoomIn">
            <h1 class="text-5xl font-bold mb-6 text-red-600 drop-shadow-md">SUPER ENGLISH</h1>
            <p class="text-2xl mb-8 font-bold">輸入你的暱稱，開始救公主！</p>
            <input type="text" id="nickname-input" placeholder="我是誰？ (如：林大明)"
                   class="w-full border-4 border-black p-5 text-3xl rounded-xl text-center mb-8 focus:outline-none focus:ring-4 focus:ring-blue-400">
            <button onclick="startGame()" class="brick-btn px-12 py-6 text-4xl rounded-2xl w-full mb-8 font-black">
                GO! 開始闖關
            </button>
            <button onclick="toggleTeacherBoard()" class="text-blue-800 underline font-bold text-lg">
                👨‍🏫 查看誰也來挑戰了？ (老師看板)
            </button>
        </div>

        <div id="question-screen" class="mario-card p-8 hidden animate__animated">
            <div class="flex justify-between items-center mb-6">
                <span id="category-tag" class="bg-blue-600 text-white px-6 py-2 rounded-full text-xl border-4 border-black font-bold">Vocabulary</span>
                <div class="bg-red-500 text-white w-12 h-12 rounded-lg border-4 border-black flex items-center justify-center font-bold">!</div>
            </div>
            <div class="mb-10 text-center">
                <h2 id="question-text" class="text-3xl font-bold text-gray-900 mb-6 leading-tight"></h2>
                <div id="chinese-translate" class="text-xl text-blue-800 bg-blue-100 p-6 rounded-2xl border-4 border-dashed border-blue-400 italic"></div>
            </div>
            <div id="options-container" class="grid grid-cols-1 gap-6"></div>
            <div class="mt-10 flex flex-col items-center">
                <button onclick="useHint()" class="brick-btn px-8 py-3 rounded-xl text-xl font-bold">
                    💡 使用金幣看提示 (-5 COINS)
                </button>
                <div id="hint-text-area" class="hidden w-full hint-box text-center text-lg mt-4 animate__animated animate__fadeInUp"></div>
            </div>
        </div>

        <div id="finish-screen" class="mario-card p-12 text-center hidden animate__animated">
            <h1 class="text-6xl font-bold mb-6 text-green-600 animate__bounceIn">COURSE CLEAR!</h1>
            <p class="text-3xl mb-10 font-bold" id="finish-msg"></p>
            <div class="flex justify-center space-x-8 mb-10">
                <img src="https://api.iconify.design/noto:party-popper.svg" class="w-24 h-24 animate-bounce">
                <img src="https://api.iconify.design/noto:fireworks.svg" class="w-24 h-24 animate-pulse">
            </div>
            <button onclick="location.reload()" class="brick-btn px-12 py-6 text-3xl rounded-2xl font-black">
                BACK TO START
            </button>
        </div>

        <div id="teacher-board" class="mario-card p-8 mt-10 hidden bg-yellow-100 border-yellow-600">
            <h2 class="text-3xl font-bold border-b-6 border-black mb-6 pb-2">👨‍🏫 勇者完成榜</h2>
            <div id="board-content" class="max-h-80 overflow-y-auto space-y-3 text-xl">尚無紀錄（離線模式）</div>
        </div>
    </div>

    <div id="hit-block" class="q-block-hit">?</div>

    <div id="mario-avatar" class="mario-char">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" fill="#E52521" stroke="black" stroke-width="2"/>
            <rect x="8" y="10" width="8" height="8" fill="#049CD8" stroke="black" stroke-width="1"/>
            <circle cx="10" cy="8" r="1.5" fill="black"/>
            <circle cx="14" cy="8" r="1.5" fill="black"/>
            <path d="M10 12C10 12 11 13 12 13C13 13 14 12 14 12" stroke="black" stroke-width="1.5"/>
        </svg>
    </div>

    <div id="monster-enemy" class="monster animate__animated animate__infinite animate__pulse">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="8" width="16" height="12" rx="4" fill="#8B4513" stroke="black" stroke-width="2"/>
            <circle cx="8" cy="12" r="2" fill="white"/>
            <circle cx="16" cy="12" r="2" fill="white"/>
            <path d="M7 16L17 16" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </div>

    <div class="ground"></div>

    <div id="streak-banner" class="streak-banner"></div>

    <div id="flag-pole" class="flag-pole">
        <div class="flag-cloth"></div>
    </div>

    <audio id="audio-coin" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="audio-wrong" src="https://assets.mixkit.co/active_storage/sfx/2073/2073-preview.mp3"></audio>
    <audio id="audio-jump" src="https://assets.mixkit.co/active_storage/sfx/2092/2092-preview.mp3"></audio>

    <script>
        // ── 排行榜：localStorage 版（GitHub Pages 不需要 Firebase 設定）──
        const LS_KEY = 'mario_quiz_results_v1';
        const loadResults = () => { try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch (e) { return []; } };
        const saveResult = (r) => {
            const arr = loadResults();
            arr.unshift(r);
            localStorage.setItem(LS_KEY, JSON.stringify(arr.slice(0, 100)));
        };

        let nickname = "";
        let currentIdx = 0;
        let coins = 0;
        let streak = 0;
        let startTime = null;

        const questions = [
            { category: "Vocabulary", question: "Mike is very ____ after running for two hours. He needs water.", chinese: "Mike 跑了兩小時後非常____。他需要水。", options: ["thirsty", "hungry", "angry"], answer: 0, hint: "他需要喝水，所以是「口渴」。" },
            { category: "Vocabulary", question: "My father works in a ____. He helps sick people there.", chinese: "我爸爸在____工作。他在那裡幫助生病的人。", options: ["park", "hospital", "market"], answer: 1, hint: "醫院（hospital）是照顧病人的地方。" },
            { category: "Grammar", question: "Look! Tanjiro ____ a book in his room now.", chinese: "看！炭治郎現在正在房裡看書。", options: ["reads", "is reading", "read"], answer: 1, hint: "看到 Look! 指的是「正在做某事」，用 be + ing。" },
            { category: "Grammar", question: "We ____ to the park with our dog last Sunday.", chinese: "上週日我們和狗一起去了公園。", options: ["go", "went", "going"], answer: 1, hint: "去年週日是「過去式」，go 變成 went。" },
            { category: "Conversation", question: "A: I am so tired today. B: ____ You worked hard yesterday.", chinese: "A：我今天好累。 B：____ 你昨天工作很辛苦。", options: ["You should rest.", "You are happy.", "Let's run."], answer: 0, hint: "累了（tired）就需要休息（rest）。" },
            { category: "Grammar", question: "A: How ____ bread do you want? B: Two pieces, please.", chinese: "A：你要多少麵包？ B：請給我兩片。", options: ["many", "much", "often"], answer: 1, hint: "麵包（bread）不可數，問多少要用 How much。" },
            { category: "Reading", question: "When you see the sign (🚭), it means: ____", chinese: "當你看到這個標誌(🚭)，意思是：____", options: ["No eating.", "No smoking.", "No running."], answer: 1, hint: "這個圖案代表「禁菸」。" },
            { category: "Conversation", question: "A: How often do you go to the library? B: ____", chinese: "A：你多常去圖書館？ B：____", options: ["Every Sunday.", "In the morning.", "It is far."], answer: 0, hint: "How often 問的是「頻率」。" }
        ];

        window.startGame = () => {
            nickname = document.getElementById('nickname-input').value.trim();
            if (!nickname) { alert("快寫個名字才能冒險！"); return; }
            document.getElementById('display-name').innerText = nickname;
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            // ── 開場：磚塊出現在 Mario 頭頂、Mario 開始原地抖動（像在跑步）──
            document.getElementById('hit-block').classList.add('show');
            document.getElementById('mario-avatar').classList.add('mario-idle');
            startTime = new Date();
            showQuestion();
        };

        window.showQuestion = () => {
            const q = questions[currentIdx];
            const screen = document.getElementById('question-screen');
            screen.classList.remove('animate__fadeInRight');
            void screen.offsetWidth;
            screen.classList.add('animate__fadeInRight');

            document.getElementById('category-tag').innerText = q.category;
            document.getElementById('question-text').innerHTML = q.question;
            document.getElementById('chinese-translate').innerText = q.chinese;
            document.getElementById('hint-text-area').classList.add('hidden');

            // 重新生一個新磚塊（恢復 ? 樣式）
            const block = document.getElementById('hit-block');
            block.classList.remove('used');
            block.innerText = '?';

            const monster = document.getElementById('monster-enemy');
            monster.style.right = "100px";

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = 'option-card p-6 rounded-2xl font-bold flex items-center shadow-lg border-4';
                card.innerHTML = `<span class="bg-blue-100 text-blue-700 w-12 h-12 rounded-full flex items-center justify-center mr-4 text-xl border-2 border-black">${String.fromCharCode(65+i)}</span> ${opt}`;
                card.onclick = () => checkAnswer(i);
                container.appendChild(card);
            });
            document.getElementById('progress').style.width = (currentIdx / questions.length) * 100 + '%';
            document.getElementById('current-stage').innerText = `1-${currentIdx + 1}`;
        };

        window.checkAnswer = (choice) => {
            if (choice === questions[currentIdx].answer) {
                // ── 答對：跳躍 + 頂磚塊 + 噴 5 金幣 + 踩怪 + 震螢幕 ──
                streak++;
                document.getElementById('streak-count').innerText = streak;
                document.getElementById('audio-jump').play().catch(()=>{});

                const mario = document.getElementById('mario-avatar');
                const monster = document.getElementById('monster-enemy');
                const block = document.getElementById('hit-block');
                const body = document.body;

                // 1. Mario 暫停 idle、起跳
                mario.classList.remove('mario-idle');
                mario.classList.remove('mario-jump');
                void mario.offsetWidth;
                mario.classList.add('mario-jump');

                // 2. 0.43 秒後（峰頂）：磚塊被頂飛 + ★ 蹦出 + 螢幕震動
                setTimeout(() => {
                    block.classList.add('block-bump');
                    body.classList.add('screen-shake');
                    document.getElementById('audio-coin').play().catch(()=>{});
                    starBurst(block);
                    shootCoins(block);
                    floatPoint(block, '+10');
                    coins += 10;
                    document.getElementById('coin-count').innerText = coins;
                }, 430);

                // 3. 0.55 秒後：磚塊變成空磚（用過了）
                setTimeout(() => {
                    block.classList.add('used');
                    block.innerText = '';
                }, 550);

                // 4. 0.75 秒後：怪物被踩扁倒地
                setTimeout(() => {
                    monster.classList.add('monster-stomped');
                }, 750);

                // 5. 連擊獎勵：每 3 連擊 → COMBO 橫幅 + 加 20 金幣 + Mario 金光
                if (streak > 0 && streak % 3 === 0) {
                    setTimeout(() => {
                        showStreakBanner(streak + ' COMBO!');
                        floatPoint(block, '+20 BONUS');
                        coins += 20;
                        document.getElementById('coin-count').innerText = coins;
                        mario.classList.add('mario-glow');
                        setTimeout(() => mario.classList.remove('mario-glow'), 1400);
                    }, 600);
                }

                // 6. 收尾：清除動畫、進入下一題（橫向捲場）
                setTimeout(() => {
                    mario.classList.remove('mario-jump');
                    mario.classList.add('mario-idle');
                    block.classList.remove('block-bump');
                    body.classList.remove('screen-shake');
                    monster.classList.remove('monster-stomped');
                    monster.style.right = "-100px";
                    nextQuestion();
                }, 1500);
            } else {
                // ── 答錯：Mario 被怪物撞到踉蹌 → 連擊歸零 → 仍然推進到下一題 ──
                streak = 0;
                document.getElementById('streak-count').innerText = '0';
                document.getElementById('audio-wrong').play().catch(()=>{});

                const mario = document.getElementById('mario-avatar');
                const monster = document.getElementById('monster-enemy');
                const screen = document.getElementById('question-screen');
                const block = document.getElementById('hit-block');

                // 題目卡左右搖晃 + 怪物衝過來
                screen.classList.add('animate__shakeX');
                monster.style.right = "150px";

                // Mario 踉蹌 + 受傷紅光
                mario.classList.remove('mario-idle');
                mario.classList.remove('mario-stumble');
                mario.classList.remove('mario-hurt');
                void mario.offsetWidth;
                mario.classList.add('mario-stumble');
                mario.classList.add('mario-hurt');

                floatPoint(block, 'OUCH!');

                // 0.9 秒後：清除受傷狀態 → 推進下一題
                setTimeout(() => {
                    screen.classList.remove('animate__shakeX');
                    mario.classList.remove('mario-stumble');
                    mario.classList.remove('mario-hurt');
                    mario.classList.add('mario-idle');
                    monster.style.right = "-100px";
                    nextQuestion();
                }, 950);
            }
        };

        // ── 換題：橫向捲軸切換（地面捲動 + 磚塊飛走 + 新磚塊滑入）──
        function nextQuestion() {
            const block = document.getElementById('hit-block');
            const ground = document.querySelector('.ground');

            // 舊磚塊往左飛走、地面往左捲動
            block.classList.remove('block-bump');
            block.classList.add('exiting');
            ground.classList.add('scrolling');

            setTimeout(() => {
                // 重置磚塊狀態
                block.classList.remove('exiting', 'used');
                block.innerText = '?';
                ground.classList.remove('scrolling');

                currentIdx++;
                if (currentIdx < questions.length) {
                    // 新磚塊從右邊滑入
                    block.classList.add('entering');
                    setTimeout(() => block.classList.remove('entering'), 750);
                    showQuestion();
                } else {
                    finishGame();
                }
            }, 850);
        }

        // ── 撞磚塊：大金星從磚塊頂端蹦出來、轉圈後飛走 ──
        function starBurst(block) {
            const rect = block.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top;
            const star = document.createElement('div');
            star.className = 'star-fly';
            star.innerHTML = '★';
            star.style.left = cx + 'px';
            star.style.top = cy + 'px';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 1500);
        }

        // ── 從磚塊噴 5 顆金幣（往上扇形散開）──
        function shootCoins(block) {
            const rect = block.getBoundingClientRect();
            const cx = rect.left + rect.width / 2 - 15;
            const cy = rect.top;
            for (let i = 0; i < 5; i++) {
                const coin = document.createElement('div');
                coin.className = 'coin-shoot';
                coin.innerHTML = '★';
                coin.style.left = cx + 'px';
                coin.style.top = cy + 'px';
                const angle = (-Math.PI / 2) + (i - 2) * 0.45;
                const dist = 100 + Math.random() * 80;
                coin.style.setProperty('--tx', (Math.cos(angle) * dist) + 'px');
                coin.style.setProperty('--ty', (Math.sin(angle) * dist) + 'px');
                coin.style.animationDelay = (i * 0.06) + 's';
                document.body.appendChild(coin);
                setTimeout(() => coin.remove(), 1300);
            }
        }

        // ── COMBO 橫幅 ──
        function showStreakBanner(text) {
            const b = document.getElementById('streak-banner');
            b.innerText = '🔥 ' + text;
            b.classList.remove('show');
            void b.offsetWidth;
            b.classList.add('show');
            setTimeout(() => b.classList.remove('show'), 1700);
        }

        // ── 加分浮字（+10 / +20）──
        function floatPoint(target, text) {
            const rect = target.getBoundingClientRect();
            const f = document.createElement('div');
            f.className = 'point-float';
            f.innerText = text;
            f.style.left = (rect.left + rect.width / 2 - 30) + 'px';
            f.style.top = (rect.top - 10) + 'px';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 1200);
        }

        window.useHint = () => {
            if (coins < 5) { alert("金幣不夠了！"); return; }
            coins -= 5;
            document.getElementById('coin-count').innerText = coins;
            document.getElementById('hint-text-area').innerText = questions[currentIdx].hint;
            document.getElementById('hint-text-area').classList.remove('hidden');
        };

        window.toggleTeacherBoard = () => {
            document.getElementById('teacher-board').classList.toggle('hidden');
            renderBoard();
        };

        function popCoinEffect(target) {
            const rect = target.getBoundingClientRect();
            const coin = document.createElement('div');
            coin.className = 'coin-pop';
            coin.innerHTML = '★';
            coin.style.left = (rect.left + rect.width/2 - 15) + 'px';
            coin.style.top = rect.top + 'px';
            document.body.appendChild(coin);
            setTimeout(() => coin.remove(), 800);
        }

        function finishGame() {
            const duration = Math.floor((new Date() - startTime) / 1000);
            saveResult({ name: nickname, coins, duration, time: new Date().toLocaleString() });
            document.getElementById('flag-pole').classList.add('show');
            showStreakBanner('STAGE CLEAR!');
            setTimeout(() => {
                document.getElementById('question-screen').classList.add('hidden');
                document.getElementById('finish-screen').classList.remove('hidden');
                document.getElementById('finish-msg').innerText = `${nickname}，闖關成功！金幣 ${coins} ／ 用時 ${duration} 秒`;
                document.getElementById('progress').style.width = '100%';
            }, 1200);
        }

        function renderBoard() {
            const list = loadResults();
            const html = list.length
                ? list.map(r => `
                    <div class="bg-white p-3 border-4 border-black flex justify-between items-center mb-3 rounded-xl">
                        <span class="font-bold text-red-600">${r.name}</span>
                        <span>💰 ${r.coins} | ⏱️ ${r.duration}秒</span>
                    </div>`).join('')
                : "尚無紀錄";
            document.getElementById('board-content').innerHTML = html;
        }
    </script>
</body>
</html>
